<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Guess the Number</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #4f46e5, #9333ea);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            width: 320px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            margin-top: 10px;
            padding: 10px;
            width: 100%;
            border: none;
            background: #4f46e5;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #4338ca;
        }

        .msg {
            margin-top: 15px;
            font-weight: bold;
        }

        .attempts {
            margin-top: 10px;
            font-size: 14px;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>🎯 Guess the Number</h2>
    <p>Computer chose a number (1–100)</p>

    <form method="POST">
        <input type="number" name="guess" placeholder="Enter your guess" required>
        <button>Guess</button>
    </form>

    <div class="attempts">Turns: {{ attempts }}</div>
    <div class="msg">{{ message }}</div>
</div>

</body>
</html>
